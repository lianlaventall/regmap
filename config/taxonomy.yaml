tiers:
  RESTRICTION:
    description: Mandatory obligations — language that compels action
    trigger_words:
      - must
      - will
      - shall
      - required
      - shall not
      - binding
      - obliged
      - mandatory

  QUALIFIED_RESTRICTION:
    description: >
      A RESTRICTION trigger word is present but the clause is softened by a qualifying
      phrase. The obligation still exists — the qualifier provides a contextual off-ramp,
      not an exemption. Record the matched qualifier in the notes field.

  GUIDED_DISCRETION:
    description: >
      Non-mandatory language where the donor has stated a preference or expectation.
      The NGO has genuine discretion — no mandate, no prior approval required.
      Classified by preference_strength:
        strong — trigger words: should, ideally. Soft obligation; non-compliance is
          audit-adjacent. The donor expects this behavior and may raise it in a review.
        soft — trigger words: recommended, suggested, encouraged, strongly encouraged,
          it is recommended, it is advisable, is advised, it is good practice, it is helpful.
          Genuine preference on record. Deviation carries no direct enforcement risk.
      Use GUIDED_DISCRETION when ALL of the following are true:
        1. The clause is permissive (no must/shall/required anywhere in the clause).
        2. The NGO does not need prior donor approval to proceed.
        3. The donor has explicitly stated a preference, recommendation, or lean.
      If a mandate exists anywhere in the clause (even softened by "whenever possible"),
      classify as QUALIFIED_RESTRICTION instead.
      Populate the preference_signal field with the substance of what the donor prefers.
    trigger_words:
      - should
      - ideally
      - recommended
      - suggested
      - encouraged
      - strongly encouraged
      - it is recommended
      - it is advisable
      - is advised
      - it is good practice
      - it is helpful

  DECISION:
    description: >
      Permissive language — actions that are allowed but not required, and where
      no donor preference is stated. Classify into one of two sub-types using the
      decision_type field:
        DISCRETIONARY_AUTONOMY — NGO actor, no approval required, no preference signal.
          Real NGO choice with no strings attached.
        CONDITIONAL_FLEXIBILITY — NGO actor nominally, but the clause requires prior
          donor approval before the NGO may proceed. The real decision lives with the
          donor. Look for phrases like "subject to AFD's prior agreement", "if an
          exception is approved", "with the agreement of".
        null — use null when tier is not DECISION.
    trigger_words:
      - may
      - can

  DONOR_RIGHT:
    description: >
      A power the donor holds over the NGO or the agreement. Not an NGO obligation.
      The NGO is the object of these clauses, not an actor exercising choice.
      Separate axis from the obligation tier ladder — do not place on the
      RESTRICTION → DECISION spectrum.
      Classify into one of four sub-types using the donor_right_type field:
        AUDIT_RIGHT — donor or third party is entitled to inspect, examine, or
          investigate records, accounts, or operations.
          Look for: "entitled to inspect", "may conduct investigations", "auditors
          appointed by", "right to examine".
        SUSPENSION_RIGHT — donor may halt or pause disbursements or the agreement.
          Look for: "may suspend", "reserves the right to suspend", "may withhold".
        TERMINATION_RIGHT — donor may revoke, terminate, or cancel the grant.
          Look for: "may revoke", "may terminate", "reserves the right to revoke",
          "may declare null and void".
        INTERVENTION_RIGHT — donor may intervene in how the project is run —
          staffing, procurement decisions, operational changes.
          Look for: "may require replacement of", "may direct", "may require the
          Contracting Authority to".
      When a clause mixes an NGO obligation with embedded donor power, classify
      by the primary (NGO-facing) obligation tier and set contains_donor_right: true
      with the appropriate donor_right_type.

qualifiers:
  description: >
    Phrases that soften an otherwise mandatory clause. When a RESTRICTION trigger
    word appears alongside one of these phrases, classify as QUALIFIED_RESTRICTION
    instead of RESTRICTION and record the matched phrase in the notes field.
  phrases:
    - where possible
    - where feasible
    - where appropriate
    - as far as possible
    - to the extent possible
    - if applicable
    - unless otherwise specified
    - subject to availability

context_patterns:
  description: >
    Verb-first phrases that signal an obligation regardless of the modal word used.
    When one of these verbs appears at the start of a clause, flag context_flag as true.
  verbs:
    - submit
    - ensure
    - verify
    - demonstrate
    - confirm
    - provide
    - notify
    - comply
    - maintain
    - retain

dead_ends:
  description: >
    Terminal states in the compliance flow for RESTRICTION and QUALIFIED_RESTRICTION
    clauses only. A dead end stops a decision path rather than redirecting it.
    Used to identify restrictions that are truly unconditional — candidates for
    cross-donor pooling — versus those only reachable via a specific upstream decision.
    Do NOT apply dead-end classification to GUIDED_DISCRETION, DECISION, or DONOR_RIGHT.
  types:
    UNCONDITIONAL:
      description: >
        No conditional language visible in the clause itself. Applies regardless of
        any upstream decision. Pooling candidate — requires human verification before
        entering cross-donor baseline (clause may sit under a conditional section
        heading or have a carve-out elsewhere in the document).
    CONDITIONAL:
      description: >
        Conditional language is visible within the clause itself (if, when, provided
        that, in cases where). Fires only on a specific decision branch. Permanent
        exclusion from cross-donor pooling — no document-level analysis changes this.
    AMBIGUOUS:
      description: >
        A genuine unresolved legal carve-out exists in the clause text — the clause
        looks absolute but contains undefined exceptions (e.g. "prohibited except in
        exceptional circumstances" where exceptional is undefined). Record the
        ambiguous phrase in notes. Excluded from pooling until resolved.
  signals:
    description: >
      Phrases that indicate a clause is a terminal restriction. When matched in a
      RESTRICTION or QUALIFIED_RESTRICTION clause, set dead_end: true in the output JSON.
    phrases:
      - only from
      - must not
      - shall not
      - no exceptions
      - not acceptable
      - not permitted
      - not allowed
      - cannot be
      - prohibited
      - in no case
      - under no circumstances
      - forbidden
      - ineligible
      - only permitted

domains:
  description: >
    Semantic topic of the clause. Assigned by the classifier to enable
    cross-donor grouping and pooled restriction analysis. Each clause receives
    one primary domain.
  values:
    PROCUREMENT:
      description: Rules governing sourcing, vendors, or purchasing
    REPORTING:
      description: Obligations to submit data, reports, or notifications
    RECORD_KEEPING:
      description: Retention, documentation, and audit trail requirements
    ELIGIBILITY_ACTOR:
      description: >
        Who can participate — sanctions lists, debarment, MDB blacklists,
        nationality rules, status disqualification
    ELIGIBILITY_COMMODITY:
      description: >
        What can be procured — commodity restrictions, pharmaceutical
        indications, product quality standards and floors
    ELIGIBILITY_ASSET:
      description: >
        How funded assets can be used — purpose restrictions,
        binding periods, repurposing prohibitions
    INTEGRITY:
      description: >
        Procurement integrity and fraud prevention — conflict of interest,
        anti-corruption certifications, falsification prohibitions,
        competition distortion rules. A proxy for donor risk culture.
    FINANCIAL:
      description: Budget, spend, reimbursement, or audit rules
    SAFEGUARDING:
      description: Protection of beneficiaries, staff, or data
